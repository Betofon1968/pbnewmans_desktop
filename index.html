    /* Loading Screen Styles */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #1a7f4b 0%, #15633b 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.3s ease;
    }
    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .loading-logo {
      font-size: 48px;
      margin-bottom: 20px;
      animation: bounce 1s infinite;
    }
    .loading-text {
      color: white;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .loading-subtext {
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      margin-bottom: 24px;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-progress {
      margin-top: 20px;
      color: rgba(255,255,255,0.7);
      font-size: 12px;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(20px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }
    
    /* ===== Auth Screen Styles ===== */
    .auth-container {
      min-height: 100vh;

  <div id="root"></div>
  
  <!-- Load scripts with progress updates -->
  <script>
    const updateProgress = (text) => {
      const el = document.getElementById('loading-progress');
      if (el) el.textContent = text;
    };
    const showFatalLoadError = (message) => {
      updateProgress(message);
      const spinner = document.querySelector('.loading-spinner');
      if (spinner) spinner.style.display = 'none';
      const subtext = document.querySelector('.loading-subtext');
      if (subtext) subtext.textContent = 'Please refresh. If this keeps happening, re-upload bundle files.';
    };
    window.showFatalLoadError = showFatalLoadError;
    updateProgress('Loading core bundle...');
  </script>
  <script src="./js/dist/vendor.bundle.js?v=26.128" onload="updateProgress('Loading application...')" onerror="showFatalLoadError('Failed loading vendor bundle')"></script>
  
  <!-- Sentry loaded async (non-blocking) -->
  <script>
    // Load Sentry after main app to not block rendering
    setTimeout(() => {
      const script = document.createElement('script');
      script.src = 'https://browser.sentry-cdn.com/8.42.0/bundle.min.js';
      script.integrity = 'sha384-mnCU8xfJtutEToQVAp8cVl1c5MsLJHnf0uLTs2w7gf115tH/bz7Nwd+LgjiBgW5P';
      script.crossOrigin = 'anonymous';
      script.onload = () => {
        if (window.Sentry && window.initSentry) window.initSentry();
      };
      script.onerror = () => {
        console.warn('Sentry CDN unavailable. Continuing without monitoring.');
      };
      document.head.appendChild(script);
    }, 100);
  </script>
  
  <!-- Main React Application (Bundled) - v26.128 -->
  <script src="./js/dist/app.bundle.js?v=26.128" onerror="showFatalLoadError('Failed loading app bundle')"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js?v=26.128').catch((error) => {
          console.warn('Service worker registration failed:', error);
        });
      });
    }
  </script>
</body>
